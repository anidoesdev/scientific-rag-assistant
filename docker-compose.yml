version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: scientific_rag_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: raguser
      POSTGRES_PASSWORD: ragpassword
      POSTGRES_DB: ragdb
    ports:
      - "5732:5432"
    volumes:
      - rag_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: scientific_rag_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - rag_redis_data:/data
    command: redis-server --appendonly yes

volumes:
  rag_pg_data:
  rag_redis_data: