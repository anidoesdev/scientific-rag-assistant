version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: scientific_rag_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: raguser
      POSTGRES_PASSWORD: ragpassword
      POSTGRES_DB: ragdb
    ports:
      - "5732:5732"
    volumes:
      - rag_pg_data:/var/lib/postgresql/data

volumes:
  rag_pg_data: